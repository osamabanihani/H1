<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homework</title>
  <style>
    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Times New Roman", serif;
      color: black;
    }

    .page {
      width: 700px;
      margin: 30px 0 0 25px;
    }

    .row {
      display: flex;
      gap: 25px;
      align-items: flex-start;
      margin-top: 70px;
    }

    .box-title {
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .link-box a {
      display: inline-block;
      width: 168px;
      height: 52px;
      line-height: 52px;
      text-align: center;
      text-decoration: none;
      font-size: 23px;
      color: #111;
      background: white;
      border: 3px solid #228b22;
    }

    .hovered a {
      background: #2f8f00;
      color: white;
      font-weight: bold;
    }

    .list-box {
      width: 505px;
      background: yellow;
      margin-top: 110px;
      padding: 10px 0 10px 32px;
    }

    .list-box ul {
      margin: 0;
      padding-left: 22px;
    }

    .list-box li {
      font-size: 18px;
      color: #f15a24;
    }

    .list-box li span {
      color: black;
    }

    .heading-section {
      position: relative;
      margin-top: 95px;
      width: 650px;
      min-height: 150px;
    }

    .bg-image {
      position: absolute;
      left: 0;
      top: 0;
      width: 95px;
      height: 135px;
      z-index: -1;
      object-fit: cover;
    }

    .heading-section h1 {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
    }

    .heading-section p {
      margin-top: 18px;
      font-size: 17px;
    }
    .text-section{
position: relative;
margin-top:50px;
}

.yellow-box{
position:absolute;
width:90px;
height:140px;
background:gold;
z-index:-1;
top:0;
left:0;
}
  </style>
</head>
<body>

  <div class="page">

    <div class="row">
      <div class="link-box">
        <div class="box-title">Before hover</div>
        <a href="https://www.w3schools.com/html/html_links.asp" target="_blank" >This is a link</a>
      </div>

      <div class="link-box hovered">
        <div class="box-title">After Hover</div>
        <a href="https://www.w3schools.com/html/html_links.asp" target="_blank">This is a link</a>
      </div>
    </div>

    <div class="list-box">
      <ul>
        <li><span>Coffee</span></li>
        <li><span>Tea</span></li>
        <li><span>Coca Cola</span></li>
      </ul>
    </div>

    <div class="text-section">
        <div class="yellow-box"></div>  
        <h1>This is a heading</h1>
        <p>Because the image has a z-index of -1, it will be placed behind the text.</p>
    </div>

</div>

</body>
</html>
