<!DOCTYPE html>
<html>
<head>
<title>Form</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
}

.container{
background:#b3b3b3;
padding:25px;
width:650px;
margin:30px auto;
border-radius:6px;
}


label{
display:block;
margin-top:15px;
margin-bottom:6px;
font-weight:500;
}

input[type=text], select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:4px;
box-sizing:border-box;
margin-bottom:15px;
}

input[type=submit]{
width:100%;
background:green;
color:white;
padding:12px;
border:none;
border-radius:4px;
font-size:16px;
cursor:pointer;
}

input[type=submit]:hover{
background:#2e8b57;
}
</style>

</head>
<body>

<div class="container">
<form>
<label>First Name</label>
<input type="text" placeholder="Your name..">
<label>Last Name</label>
<input type="text" placeholder="Your last name..">
<label>Country</label>

<select>
<option>Jordan</option>
<option>Saudi Arabia</option>
<option>Morocco</option>
<option>Egypt</option>
</select>

<input type="submit" value="Submit">
</form>
</div>

</body>
</html>
