<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('e89b7464-ac2c-4d20-8b45-81bf8097fa52.png') no-repeat center center/cover;
    }

    .login-box {
      width: 430px;
      padding: 40px 30px;
      background: rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      border-radius: 2px;
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
      color: #000;
      font-weight: bold;
    }

    .input-box {
      width: 100%;
      margin-bottom: 16px;
    }

    .input-box input {
      width: 100%;
      padding: 18px 15px;
      border: none;
      background: rgba(255, 255, 255, 0.75);
      font-size: 16px;
      color: #333;
      border-radius: 3px;
    }

    .input-box input::placeholder {
      color: #888;
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      border: none;
      background: #145d00;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 5px;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: #0f4700;
    }

    .options {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

  </style>
</head>
<body>

  <div class="login-box">
    <h2>Account Login</h2>

      <div class="input-box">
        <input type="text" placeholder="user name" />
      </div>

      <div class="input-box">
          <input type="password" placeholder="password" />
      </div>

      <button class="login-btn" onclick="window.location.href='index61.html'">LOGIN</button>

      <div class="options">
        <label>
          <input type="checkbox" />
          remember me
        </label>
        <div>
          <a href="index62.html">Forgot Password?</a>
      </div>
    </div>
  </div>

</body>
</html>
